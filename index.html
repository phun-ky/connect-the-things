    <script type="module">
      import { createConnections } from './src/main.ts';
      const boxes = document.querySelectorAll('.box');
      const total = boxes.length;
      const connectionDefinitions = [...boxes].map((box) => {
        // Create a list of stop candidates, excluding the current box
        const stopCandidates = [...boxes].filter((b) => b !== box);

        // Pick a random stopElement from the filtered list
        const stopElement =
          stopCandidates[Math.floor(Math.random() * stopCandidates.length)];

        return {
          startElement: box, // Always the current box
          stopElement: stopElement
        };
      });

      createConnections(connectionDefinitions);
    </script>
